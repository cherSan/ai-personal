<header>
  <div class="panel">
    <div class="badge">
      PERSONAL KNOWLEDGE AI
    </div>
    <h1>
      Aleksandr Chernushevich
    </h1>
    <p>
      Search documents, projects, experience and personal knowledge through AI.
    </p>
  </div>
</header>

<main #messagesContainer>
  <div class="chat">
    @for (message of messages(); track $index) {

      <div
        class="message"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'"
        [class.error]="message.error"
      >
        <span>{{ message.text }}</span>
        <div class="extra">
          <span class="timestamp">{{ message.timestamp }}</span>
          <span class="role">{{ message.role }}</span>
        </div>
      </div>

    }

    @if (loading()) {

      <div class="thinking">

        <span></span>
        <span></span>
        <span></span>

      </div>

    }
  </div>
</main>

<footer>
  <div class="composer">
    <input
      #input
      class="composer-input"
      type="text"
      placeholder="Ask anything..."
      [value]="value()"
      [disabled]="loading()"
      (input)="value.set(input.value)"
      (keydown.enter)="onSubmit()"
    />
    <button
      class="send-button"
      [disabled]="loading() || !value().trim()"
      (click)="onSubmit()">

      →
    </button>
  </div>
</footer>
